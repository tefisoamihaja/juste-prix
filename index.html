<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
  <div class="container">
  
  <div class="row justify-content-center mt-5">
    <header>
      Le Juste Prix
    </header>
  </div>
  
  <!-- Formulaire -->
  <div class="row justify-content-center mt-5 mb-4">   
    <div class="col-12 col-sm-10 col-lg-8">   
      <div class="bg-light p-5 shadow">
        
        <form id="formulaire">
          <div class="row g-2">
            <div class="col-12 col-sm-8">
              <input id="prix" class="form-control" placeholder="Devinez le prix ! (entre 0 et 1 000)" />
            </div>
            <div class="col-12 col-sm-4">
              <button type="submit" class="btn btn-primary w-100">Deviner</button>
            </div>
          </div>
          <small class="text-danger d-block mt-2">Vous devez rentrer un nombre.</small>
        </form>
        
      </div>  
    </div>
  </div>
  
  <!-- Instructions -->
  <div class="row justify-content-center">
    <div id="instructions" class="col-12 col-sm-10 col-lg-8"></div>
  </div>
  
</div>
    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net"></script>

</body>
</html>
